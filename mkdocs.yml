site_name: Research News
site_description: 每日统计学与因果推断研究资讯
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - 主页: index.md
  - 每日存档: all_daily.md
  - 精读存档: all_deep_reads.md
  - 期刊存档: all_journals.md
  - 每周周报: all_weekly.md
  - 模型测评: all_shootout.md

plugins:
  - search

extra_javascript:
  - javascripts/extras.js
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
