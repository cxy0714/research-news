site_name: Research News
site_description: 每日统计学与因果推断研究资讯
theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - 主页: index.md
  - 每日存档: all_daily.md
  - 精读存档: all_deep_reads.md
  - 期刊存档: all_journals.md
  - 每周周报: all_weekly.md
  - 模型测评: all_shootout.md
  - 更新日志: changelog.md

plugins:
  - search

extra_javascript:
  - javascripts/extras.js
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  # Giscus comment system (GitHub Discussions backend).
  # To enable: (1) turn on Discussions in repo settings, (2) install the
  # Giscus GitHub App (https://github.com/apps/giscus), (3) go to
  # https://giscus.app/, enter the repo, copy the data-repo-id and
  # data-category-id, then fill them in below. While repo_id is empty,
  # the comment widget is not rendered.
  giscus:
    repo: cxy0714/research-news
    repo_id: "R_kgDOSek5hQ"
    category: "General"
    category_id: "DIC_kwDOSek5hc4C9ZaC"
    mapping: pathname
    reactions_enabled: "1"
    input_position: bottom
    lang: zh-CN

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
