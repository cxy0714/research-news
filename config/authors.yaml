# Authors to track via Semantic Scholar.
#
# Resolution: leave semantic_scholar_id blank — first run resolves by name +
# affiliation_hint (substring match) and caches the ID in
# data/authors_resolved.json. If a common name resolves wrong, look up the
# correct authorId at https://www.semanticscholar.org/ and paste it in.
#
# Tip: lookback_days lives in config/sources.yaml (default 14). Keep this
# list curated — every author costs ~1s + an API call per run.

authors:
  # ============================================================
  # Causal inference (primary)
  # identification / Proximal CI / IV / mediation / longitudinal /
  # sensitivity analysis / semiparametric efficient estimation
  # ============================================================

  - name: "James Robins"
    affiliation_hint: "Harvard"
    # 学科开山. HOIF / longitudinal / g-methods / IV. 直接命中你 U-stat + 效率理论的交叉.

  - name: "Eric Tchetgen Tchetgen"
    affiliation_hint: "Pennsylvania"
    # Proximal CI 的主要推手 — 你在 interests 里专门点了名.

  - name: "Andrea Rotnitzky"
    affiliation_hint: "Pennsylvania"
    # Semiparametric CI + 缺失数据, 与 Robins 体系无缝.

  - name: "Mark van der Laan"
    affiliation_hint: "Berkeley"
    # TMLE 学派. 高产, 期刊 + arxiv 都发, 经常落在 stat.ML 而被你 daily 漏掉.

  - name: "Edward Kennedy"
    affiliation_hint: "Carnegie Mellon"
    # Debiased ML / semiparametric efficient CI 当代最活跃的人. 命中度极高.

  - name: "Iván Díaz"
    affiliation_hint: "NYU"
    # Longitudinal mediation / TMLE 应用, 经常发 biostats 期刊不挂 arxiv.

  - name: "Thomas Richardson"
    affiliation_hint: "Washington"
    # SWIG / nested Markov 识别 — 你 W21 周报刚挑了一篇 SWIG 的论文.

  - name: "Ilya Shpitser"
    affiliation_hint: "Johns Hopkins"
    # 图模型识别 / mediation 识别. Robins-Richardson 圈子.

  - name: "Stijn Vansteelandt"
    affiliation_hint: "Ghent"
    # Mediation + sensitivity 欧洲一极. 经常发 JRSSB / Biometrika 不挂 arxiv.

  - name: "Peng Ding"
    affiliation_hint: "Berkeley"
    # Sensitivity analysis / 有限样本 CI / 设计-based. 高产稳定.

  - name: "Stefan Wager"
    affiliation_hint: "Stanford"
    # Causal forest + double ML. 经常发在 cs.LG / 经济期刊.

  - name: "Lihua Lei"
    affiliation_hint: "Stanford"
    # Conformal + causal 交叉. 跨 stat.ME / stat.ML 高产.

