# Research interests. Used as context for the LLM when scoring & summarizing papers.
# Edit freely — natural language is fine, the LLM reads it directly.

researcher: "陈星宇 (Chen Xingyu)"

primary_interests:
  - causal inference (identification, estimation, sensitivity analysis, IV, mediation, longitudinal)
  - mathematical statistics
  - high-dimensional statistics (sparse models, inference after selection)
  - higher-order U-statistics
  - semiparametric and nonparametric theory
  - efficiency theory (semiparametric efficiency bounds, asymptotic efficiency, debiased ML)
  - inverse problems (deconvolution, instrumental regression, ill-posed)
  - statistical computing (numerical methods, MCMC, optimization for statistical estimators)

secondary_interests:
  - astrostatistics (data analysis for astronomy)
  - mechanism design (economic theory, auctions, matching)

# Scoring guidance for LLM (0-10):
# 10  = directly advances primary interest with novel theory or method
# 7-9 = strongly related to primary interest
# 4-6 = adjacent / methodological overlap / strong secondary match
# 1-3 = tangential
# 0   = unrelated
score_threshold_show: 4   # papers below this are dropped from the daily report
score_threshold_highlight: 8  # papers above this go to the "⭐ 高相关" section

# Language for the report
output_language: "Chinese"

# Style guidance for the LLM
summary_style: |
  - 3-5 句中文摘要，先说做了什么，再说核心结论或方法贡献。
  - 避免空泛形容词；点出技术关键词（如 efficient influence function、cross-fitting、minimax rate 等）。
  - 末尾一句"为什么对您有用"：一句话点出与上面 primary_interests 的具体连接。
