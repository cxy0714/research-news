# Research interests. Used as context for the LLM when scoring & summarizing papers.
# Edit freely — natural language is fine, the LLM reads it directly.

researcher: "陈星宇 (Chen Xingyu)"

primary_interests:
  - causal inference (identification, estimation, sensitivity analysis, Proximal causal inference, IV, mediation, longitudinal)
  - mathematical statistics (hypothesis testing)
  - high-dimensional statistics (Random matrix thoery)
  - higher-order U-statistics
  - semiparametric and nonparametric theory
  - efficiency theory (semiparametric efficiency bounds, asymptotic efficiency, debiased ML)
  - statistical computing (numerical methods, algorithm)


secondary_interests:
  - >-
    astrostatistics (data sets, data analysis for astronomy, astrostat,
    popular science article, article from statistician).
    Strong upgrade signals for an astronomy paper — score it as if it were
    a primary-interest paper when EITHER applies:
    (a) data with non-Euclidean / manifold / directional / spherical structure
    (sky coordinates, weak-lensing shear field, point processes on the
    sphere, functional data on the celestial sphere, etc.);
    (b) non-trivial statistical methodology (semiparametric, hierarchical
    Bayes beyond off-the-shelf MCMC, likelihood-free / simulation-based
    inference, GP on the sphere, optimal transport on manifolds,
    debiased / efficient estimation).
    Both (a) and (b) -> 8-10. Either alone -> 7-8. Neither ->
    treat as ordinary astronomy and score low.
  - economic theory (application, data sets, model, causal inference)
  - epidemiology (application, data sets, causal inference)

# Scoring guidance for LLM (0-10):
# 10  = directly advances primary interest with novel theory or method,
#       OR a rigorous applied paper with real datasets in a primary/secondary
#       area whose analysis pattern is transferable to the researcher's work
# 7-9 = strongly related to primary interest; OR solid applied work with real
#       data in a secondary area (astrostats / econ / epidemiology) that uses
#       non-trivial statistical methodology (IV, DML, semiparametric, etc.)
# 4-6 = adjacent / methodological overlap / weak secondary match
# 1-3 = tangential
# 0   = unrelated
#
# Note: "real-data application" papers (novelty_flag = application) should not
# be auto-downgraded — they enter the deep-read list at score >= 7 because the
# datasets and analytical pipelines are themselves valuable.
score_threshold_show: 4   # papers below this are dropped from the daily report
score_threshold_highlight: 8  # papers above this go to the "⭐ 高相关" section

# Language for the report
output_language: "Chinese"

# Style guidance for the LLM
summary_style: |
  - 5-7 句中文摘要，先说做了什么，再说核心结论或方法贡献。
  - 避免空泛形容词；点出技术关键词（如 efficient influence function、cross-fitting、minimax rate 等）。
  - 末尾一句"为什么对您有用"：一句话点出与上面 primary_interests 和 secondary_interests 的具体连接。
