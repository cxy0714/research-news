arxiv:
  enabled: true
  # Only "new" submissions per day (no cross-list, no v2/v3 — per user choice).
  categories:
    - stat.ME
    - stat.TH
    - math.ST
    - econ.EM
    - astro-ph.IM
  include_cross_listed: false
  max_per_category: 80   # safety cap; daily new submissions in stat.ME are ~20-40

conferences:
  enabled: false
  # Generic approach: fetch HTML/RSS, send cleaned text to LLM to extract events.
  # This avoids per-site parser maintenance. Each source has a "kind" hint.
  sources:
    - name: "SCI events"
      url: "https://sci-info.org/events/"
      kind: "society"
    - name: "ACIC 2026"
      url: "https://sci-info.org/2026-meeting-2/"
      kind: "conference"
    - name: "EuroCIM Oxford 2026"
      url: "https://eurocim.org/oxford-2026/program/talk-abstracts.html"
      kind: "conference"
    - name: "PCIC 2026"
      url: "https://spco.cc/pcic2026/"
      kind: "conference"
    - name: "ETH Seminar for Statistics"
      url: "https://math.ethz.ch/sfs"
      kind: "seminar"

authors:
  enabled: true
  provider: "semantic_scholar"
  lookback_days: 14
