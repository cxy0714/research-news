# Journal grouping. journals.py reads this to decide what to fetch and how
# to split the output into separate pages.
#
# Each group renders to its own markdown file:
#   docs/journals/<date>-<group>-<year>Q<n>.md
#
# To add a journal: add it under the appropriate group with its ISSN. The
# label is what shows up in the rendered page heading.
# For JMLR (which we scrape directly, not via Crossref), use issn: jmlr.

groups:
  core:
    label: "理论核心 (Core Theory)"
    journals:
      - short: JMLR
        full:  "Journal of Machine Learning Research"
        issn:  jmlr
      - short: AoS
        full:  "Annals of Statistics"
        issn:  "0090-5364"
      - short: JASA
        full:  "Journal of the American Statistical Association"
        issn:  "0162-1459"
      - short: JRSSB
        full:  "Journal of the Royal Statistical Society Series B"
        issn:  "1369-7412"
      - short: Biometrika
        full:  "Biometrika"
        issn:  "0006-3444"

  prob_stats:
    label: "概率统计 (Prob-Stats)"
    journals:
      - short: AoP
        full:  "Annals of Probability"
        issn:  "0091-1798"
      - short: Bernoulli
        full:  "Bernoulli"
        issn:  "1350-7265"
      - short: EJS
        full:  "Electronic Journal of Statistics"
        issn:  "1935-7524"
      - short: "Statistica Sinica"
        full:  "Statistica Sinica"
        issn:  "1017-0405"
      - short: "Scand. J. Stat."
        full:  "Scandinavian Journal of Statistics"
        issn:  "0303-6898"

  applied:
    label: "应用 / 生物统计 (Applied & Biostat)"
    journals:
      - short: AoAS
        full:  "Annals of Applied Statistics"
        issn:  "1932-6157"
      - short: Biometrics
        full:  "Biometrics"
        issn:  "0006-341X"
      - short: Biostatistics
        full:  "Biostatistics"
        issn:  "1465-4644"
      - short: "JRSS-C"
        full:  "Journal of the Royal Statistical Society Series C"
        issn:  "0035-9254"

  econ:
    label: "经济学 / 计量 (Econ)"
    journals:
      - short: Econometrica
        full:  "Econometrica"
        issn:  "0012-9682"
      - short: "J. Econometrics"
        full:  "Journal of Econometrics"
        issn:  "0304-4076"
      - short: "Quant. Econ."
        full:  "Quantitative Economics"
        issn:  "1759-7323"
      - short: JBES
        full:  "Journal of Business & Economic Statistics"
        issn:  "0735-0015"

  astro:
    label: "天文统计 (Astrostatistics)"
    # Note: no dedicated astrostat journals exist; these are astronomy mains.
    # Expect high volume + heavy non-stats noise — rely on LLM scoring +
    # secondary-topic deep-read filter to surface the methodology pieces.
    journals:
      - short: MNRAS
        full:  "Monthly Notices of the Royal Astronomical Society"
        issn:  "0035-8711"
      - short: ApJS
        full:  "Astrophysical Journal Supplement Series"
        issn:  "0067-0049"

  epi:
    label: "流行病学 (Epidemiology)"
    journals:
      - short: StatMed
        full:  "Statistics in Medicine"
        issn:  "0277-6715"
      - short: SMMR
        full:  "Statistical Methods in Medical Research"
        issn:  "0962-2802"
      - short: AJE
        full:  "American Journal of Epidemiology"
        issn:  "0002-9262"
      - short: Epidemiology
        full:  "Epidemiology"
        issn:  "1044-3983"

  ieee:
    label: "IEEE 系列 (IEEE)"
    journals:
      - short: TIT
        full:  "IEEE Transactions on Information Theory"
        issn:  "0018-9448"
      - short: TPAMI
        full:  "IEEE Transactions on Pattern Analysis and Machine Intelligence"
        issn:  "0162-8828"
      - short: TSP
        full:  "IEEE Transactions on Signal Processing"
        issn:  "1053-587X"
      - short: JSAIT
        full:  "IEEE Journal on Selected Areas in Information Theory"
        issn:  "2641-8770"
